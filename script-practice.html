<body>
    <div class="msg-conatiner hide">
        <p id="msg">Winner</p>
        <button class="new-game">
            New Game
        </button>
    </div>
    <h1>Tic Tac Toe</h1>
    <div class="container">
        <div class="game">
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>
    </div>
    <button class="reset">Reset Game</button>

    <script>
        let boxs = document.querySelectorAll(".cell");
        let resetBtn = document.querySelector(".reset");
        let newGameBtn = document.querySelector(".new-game");
        let msgContainer = document.querySelector(".msg-conatiner");
        let msg = document.querySelector("#msg");

        let turnO = true;
        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        const resetGame = () => {
            turnO = true;
            enableBoxes();
            msgContainer.classList.add("hide");
        };

        boxs.forEach((box) => {
            box.addEventListener("click", () => {
                // box.innerText = "bgdgsdf"
                if (turnO) {
                    box.innerText = "X";
                    turnO = false;
                } else {
                    box.innerText = "O";
                    turnO = true;
                }
                box.disabled = true;

                checkWinner();
            });
        });
        const disableBoxes = () => {
            for (let box of boxs) {
                box.disabled = true;
            }
        };
        const enableBoxes = () => {
            for (let box of boxs) {
                box.disabled = false;
                box.innerText = "";
            }
        };

        const showWinner = (winner) => {
            msg.innerText = `congratulation, Winner is ${winner}`;
            msgContainer.classList.remove("hide");
            disableBoxes();
        };

        // const checkWinner = () => {
        //     for (let pattern of winPatterns) {
        //         let pos1 = boxs[pattern[0]].innerText;
        //         let pos2 = boxs[pattern[1]].innerText;
        //         let pos3 = boxs[pattern[2]].innerText;

        //         if (pos1 != "" && pos2 != "" && pos3 != "") {
        //             if (pos1 === pos2 && pos2 === pos3) {
        //                 // console.log("Winner is " + pos1);

        //                 showWinner(pos1);
        //             }
        //         }
        //     }
        // };

        const checkWinner = () => {
            let winner = false;

            for (let pattern of winPatterns) {
                let pos1 = boxs[pattern[0]].innerText;
                let pos2 = boxs[pattern[1]].innerText;
                let pos3 = boxs[pattern[2]].innerText;

                if (pos1 !== "" && pos2 !== "" && pos3 !== "") {
                    if (pos1 === pos2 && pos2 === pos3) {
                        winner = true;
                        showWinner(pos1);
                        return;
                    }
                }
            }

            // Check if all boxes are filled
            let filled = true;

            for (let box of boxs) {
                if (box.innerText === "") {
                    filled = false;
                    break;
                }
            }

            // No winner and all boxes filled
            if (filled && !winner) {
                msg.innerText = "Nobody Wins! Game Draw.";
                msgContainer.classList.remove("hide");
                disableBoxes();
            }
        };

        newGameBtn.addEventListener("click", resetGame);
        resetBtn.addEventListener("click", resetGame);
    </script>
